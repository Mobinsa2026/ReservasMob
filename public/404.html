<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Sala de Reuniones</title>
    <script type="text/javascript">
      // Truco estándar para SPAs en GitHub Pages (rafgraph/spa-github-pages):
      // GitHub no tiene rewrite de servidor, así que reescribe la ruta real
      // (ej. /ReservasMob/login) como querystring de index.html; el script en
      // index.html la decodifica antes de que React Router monte.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
